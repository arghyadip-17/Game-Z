<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>2048 — Game-Z</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#07080f;--surface:#0d1117;--card:#111722;--border:#1e2a3a;--accent:#00e5ff;--accent2:#ff3cac;--text:#e8f0fe;--muted:#6b7a99}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}
  /* NAV */
  .gz-nav{width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;background:rgba(7,8,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
  .gz-logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
  .gz-back{display:flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;border:1px solid var(--border);padding:6px 16px;border-radius:100px;transition:color 0.2s,border-color 0.2s}
  .gz-back:hover{color:var(--accent);border-color:rgba(0,229,255,0.4)}
  .gz-back::before{content:'←';font-size:14px}
  .gz-game-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
  /* WRAP */
  .gz-wrap{width:100%;max-width:520px;padding:28px 24px 48px;display:flex;flex-direction:column;align-items:center;flex:1;gap:16px}
  /* HUD */
  .hud{display:flex;gap:12px;align-items:center}
  .score-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 20px;text-align:center;min-width:90px}
  .score-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
  .score-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--accent)}
  /* BOARD */
  .board-wrap{background:#0a1220;border-radius:14px;padding:10px;border:1px solid var(--border);box-shadow:0 8px 40px rgba(0,0,0,0.6)}
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:380px;height:380px}
  .cell{border-radius:8px;background:#0d1c2e;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;transition:background 0.1s,transform 0.1s;user-select:none}
  .cell.pop{animation:pop 0.12s ease-out}
  @keyframes pop{0%{transform:scale(0.8)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
  /* tile colors */
  .t2   {background:#1a3a2a;color:#7fffd4}
  .t4   {background:#1a2a3a;color:#7dd3fc}
  .t8   {background:#2a1a3a;color:#c4b5fd}
  .t16  {background:#3a1a2a;color:#f9a8d4}
  .t32  {background:#3a2a1a;color:#fdba74}
  .t64  {background:#3a1a1a;color:#fca5a5}
  .t128 {background:#2a3a1a;color:#bef264;font-size:24px}
  .t256 {background:#1a3a3a;color:#67e8f9;font-size:24px}
  .t512 {background:#3a3a1a;color:#fde047;font-size:22px}
  .t1024{background:#3a1a3a;color:#e879f9;font-size:20px}
  .t2048{background:linear-gradient(135deg,#f7c948,#ff3cac);color:#000;font-size:20px;box-shadow:0 0 24px rgba(247,201,72,0.5)}
  /* controls */
  .controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .gz-btn{padding:9px 22px;border-radius:100px;border:none;background:linear-gradient(135deg,var(--accent),#0090b5);color:#000;font-weight:700;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;transition:box-shadow 0.2s,transform 0.15s}
  .gz-btn:hover{box-shadow:0 0 20px rgba(0,229,255,0.4);transform:translateY(-1px)}
  .gz-btn-ghost{padding:9px 22px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:border-color 0.2s,color 0.2s}
  .gz-btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .hint{color:var(--muted);font-size:12px;text-align:center}
  /* overlay */
  .overlay{position:absolute;inset:0;border-radius:14px;background:rgba(0,0,0,0.8);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity 0.3s}
  .overlay.show{opacity:1;pointer-events:all}
  .overlay-title{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:3px}
  .overlay-sub{color:var(--muted);font-size:14px}
  .board-wrap{position:relative}
  /* touch pad */
  .touch-pad{display:grid;grid-template-columns:repeat(3,48px);gap:6px;justify-items:center;align-items:center}
  .tp-btn{width:48px;height:48px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;transition:background 0.15s,border-color 0.15s}
  .tp-btn:hover{background:#1e2a3a;border-color:var(--accent)}
</style>
</head>
<body>
  <div class="gz-bg-grid" style="position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none"></div>

  <nav class="gz-nav" style="position:relative;z-index:100">
    <a href="../index.html" class="gz-logo">Game‑Z</a>
    <span class="gz-game-title">2048</span>
    <a href="../index.html" class="gz-back">All Games</a>
  </nav>

  <div class="gz-wrap" style="position:relative;z-index:1">
    <h1 style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--accent)">2048</h1>

    <div class="hud">
      <div class="score-box"><div class="score-label">Score</div><div class="score-val" id="score">0</div></div>
      <div class="score-box"><div class="score-label">Best</div><div class="score-val" id="best">0</div></div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
      <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlayTitle">Game Over</div>
        <div class="overlay-sub" id="overlaySub">No more moves!</div>
        <button class="gz-btn" onclick="restart()">Play Again</button>
      </div>
    </div>

    <div class="controls">
      <button class="gz-btn" onclick="restart()">↺ New Game</button>
      <button class="gz-btn-ghost" onclick="undoMove()">↩ Undo</button>
    </div>

    <div class="touch-pad">
      <div></div><button class="tp-btn" onclick="move('up')">↑</button><div></div>
      <button class="tp-btn" onclick="move('left')">←</button><div></div><button class="tp-btn" onclick="move('right')">→</button>
      <div></div><button class="tp-btn" onclick="move('down')">↓</button><div></div>
    </div>

    <div class="hint">Use arrow keys or swipe to merge tiles. Reach 2048!</div>
  </div>

<script>
let grid = [], score = 0, best = parseInt(localStorage.getItem('2048best')||'0'), won = false;
let prev = null;

const boardEl = document.getElementById('board');
const scoreEl = document.getElementById('score');
const bestEl  = document.getElementById('best');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub   = document.getElementById('overlaySub');

bestEl.textContent = best;

function newGrid(){ return Array.from({length:4},()=>Array(4).fill(0)); }

function restart(){
  grid = newGrid(); score = 0; won = false; prev = null;
  overlay.classList.remove('show');
  addTile(); addTile();
  render();
}

function addTile(){
  const empty=[];
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(!grid[r][c]) empty.push([r,c]);
  if(!empty.length) return false;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
  return true;
}

function render(){
  boardEl.innerHTML='';
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    const v=grid[r][c];
    const cell=document.createElement('div');
    cell.className='cell'+(v?` t${v}`:'');
    if(v) cell.textContent=v;
    boardEl.appendChild(cell);
  }
  scoreEl.textContent=score;
  if(score>best){ best=score; bestEl.textContent=best; localStorage.setItem('2048best',best); }
}

function cloneGrid(g){ return g.map(r=>[...r]); }

function slideRow(row){
  let arr=row.filter(x=>x); let merged=false; let pts=0;
  for(let i=0;i<arr.length-1;i++){
    if(arr[i]===arr[i+1]&&!merged){
      arr[i]*=2; pts+=arr[i]; arr.splice(i+1,1); merged=true;
    } else { merged=false; }
  }
  while(arr.length<4) arr.push(0);
  return {row:arr,pts};
}

function move(dir){
  prev={grid:cloneGrid(grid),score};
  let moved=false, pts=0;
  if(dir==='left'||dir==='right'){
    for(let r=0;r<4;r++){
      let row=[...grid[r]];
      if(dir==='right') row.reverse();
      const {row:newRow,pts:p}=slideRow(row);
      if(dir==='right') newRow.reverse();
      if(JSON.stringify(grid[r])!==JSON.stringify(newRow)) moved=true;
      grid[r]=newRow; pts+=p;
    }
  } else {
    for(let c=0;c<4;c++){
      let col=grid.map(r=>r[c]);
      if(dir==='down') col.reverse();
      const {row:newCol,pts:p}=slideRow(col);
      if(dir==='down') newCol.reverse();
      if(JSON.stringify(grid.map(r=>r[c]))!==JSON.stringify(newCol)) moved=true;
      newCol.forEach((v,r)=>grid[r][c]=v); pts+=p;
    }
  }
  if(!moved) return;
  score+=pts;
  addTile();
  render();
  animateNew();
  if(!won && grid.some(r=>r.includes(2048))){
    won=true; showOverlay('🎉 You Win!','You reached 2048! Keep going?',true);
  } else if(!canMove()){
    showOverlay('Game Over','No more moves available!',false);
  }
}

function animateNew(){
  const cells=boardEl.querySelectorAll('.cell');
  cells.forEach(c=>{ if(c.classList.length>1){ c.classList.add('pop'); c.addEventListener('animationend',()=>c.classList.remove('pop'),{once:true}); }});
}

function canMove(){
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    if(!grid[r][c]) return true;
    if(c<3&&grid[r][c]===grid[r][c+1]) return true;
    if(r<3&&grid[r][c]===grid[r+1][c]) return true;
  }
  return false;
}

function undoMove(){
  if(!prev) return;
  grid=cloneGrid(prev.grid); score=prev.score; prev=null;
  overlay.classList.remove('show');
  render();
}

function showOverlay(title,sub,keepGoing){
  overlayTitle.textContent=title;
  overlaySub.textContent=sub;
  if(keepGoing){ overlay.querySelector('.gz-btn').textContent='Keep Going'; }
  else { overlay.querySelector('.gz-btn').textContent='Play Again'; }
  overlay.classList.add('show');
  if(!keepGoing) overlay.querySelector('.gz-btn').onclick=restart;
  else overlay.querySelector('.gz-btn').onclick=()=>overlay.classList.remove('show');
}

// Keyboard
window.addEventListener('keydown',e=>{
  const map={'ArrowLeft':'left','ArrowRight':'right','ArrowUp':'up','ArrowDown':'down'};
  if(map[e.key]){e.preventDefault();move(map[e.key]);}
});

// Swipe
let tx=0,ty=0;
document.getElementById('board').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.getElementById('board').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<20&&Math.abs(dy)<20) return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
});

restart();
</script>
</body>
</html>
