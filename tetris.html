<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Tetris — Game-Z</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#07080f;--surface:#0d1117;--card:#111722;--border:#1e2a3a;--accent:#00e5ff;--accent2:#ff3cac;--text:#e8f0fe;--muted:#6b7a99}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}
  .gz-nav{width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;background:rgba(7,8,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
  .gz-logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
  .gz-back{display:flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;border:1px solid var(--border);padding:6px 16px;border-radius:100px;transition:color 0.2s,border-color 0.2s}
  .gz-back:hover{color:var(--accent);border-color:rgba(0,229,255,0.4)}
  .gz-back::before{content:'←';font-size:14px}
  .gz-game-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
  .gz-wrap{width:100%;max-width:700px;padding:24px 20px 48px;display:flex;flex-direction:column;align-items:center;flex:1;gap:16px;position:relative;z-index:1}
  .gz-btn{padding:9px 22px;border-radius:100px;border:none;background:linear-gradient(135deg,var(--accent),#0090b5);color:#000;font-weight:700;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;transition:box-shadow 0.2s,transform 0.15s}
  .gz-btn:hover{box-shadow:0 0 20px rgba(0,229,255,0.4);transform:translateY(-1px)}
  .gz-btn-ghost{padding:9px 22px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:border-color 0.2s,color 0.2s}
  .gz-btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

  /* GAME LAYOUT */
  .game-layout{display:flex;gap:20px;align-items:flex-start}
  canvas{border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,0.7),0 0 0 1px var(--border);display:block}
  .side-panel{width:140px;display:flex;flex-direction:column;gap:14px}
  .info-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center}
  .info-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .info-val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:var(--accent)}
  .next-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  #nextCanvas{border-radius:6px;background:var(--surface);display:block;border:1px solid var(--border)}
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  /* touch grid */
  .touch-controls{display:grid;grid-template-columns:repeat(4,52px);gap:6px;margin-top:8px}
  .tc-btn{height:48px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;transition:background 0.15s}
  .tc-btn:hover{background:#1e2a3a;border-color:var(--accent)}
  .hint{color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
<body>
  <div style="position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none"></div>

  <nav class="gz-nav" style="position:relative;z-index:100">
    <a href="../index.html" class="gz-logo">Game‑Z</a>
    <span class="gz-game-title">Tetris</span>
    <a href="../index.html" class="gz-back">All Games</a>
  </nav>

  <div class="gz-wrap">
    <h1 style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--accent)">Tetris</h1>

    <div class="game-layout">
      <canvas id="board" width="240" height="480"></canvas>
      <div class="side-panel">
        <div class="info-box"><div class="info-label">Score</div><div class="info-val" id="score">0</div></div>
        <div class="info-box"><div class="info-label">Level</div><div class="info-val" id="level">1</div></div>
        <div class="info-box"><div class="info-label">Lines</div><div class="info-val" id="lines">0</div></div>
        <div class="info-box">
          <div class="next-label">Next</div>
          <canvas id="nextCanvas" width="80" height="80"></canvas>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="gz-btn" id="startBtn" onclick="startGame()">▶ Start</button>
      <button class="gz-btn-ghost" onclick="togglePause()">⏸ Pause</button>
      <button class="gz-btn-ghost" onclick="restartGame()">↺ Restart</button>
    </div>

    <div class="touch-controls">
      <button class="tc-btn" onclick="userMove(-1,0)">←</button>
      <button class="tc-btn" onclick="userMove(0,1)">↓</button>
      <button class="tc-btn" onclick="rotatePiece()">↻</button>
      <button class="tc-btn" onclick="userMove(1,0)">→</button>
    </div>

    <div class="hint">← → move &nbsp;·&nbsp; ↑ rotate &nbsp;·&nbsp; ↓ soft drop &nbsp;·&nbsp; Space hard drop</div>
  </div>

<script>
const COLS=10, ROWS=20, SZ=24;
const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
const nextC=document.getElementById('nextCanvas');
const nctx=nextC.getContext('2d');

const COLORS=['','#00e5ff','#f7c948','#ff3cac','#00e676','#ff6b35','#a78bfa','#f87171'];
const PIECES=[
  null,
  [[1,1,1,1]],                         // I - cyan
  [[2,2],[2,2]],                        // O - gold
  [[0,3,0],[3,3,3]],                    // T - pink
  [[4,0],[4,0],[4,4]],                  // L - green
  [[0,5],[0,5],[5,5]],                  // J - orange
  [[6,6,0],[0,6,6]],                    // S - purple
  [[0,7,7],[7,7,0]],                    // Z - red
];

let board, piece, pieceX, pieceY, nextPiece, score, level, lines, gameRunning, paused, dropTimer, dropInterval;

function emptyBoard(){ return Array.from({length:ROWS},()=>Array(COLS).fill(0)); }

function randomPiece(){ return Math.floor(Math.random()*7)+1; }

function startGame(){
  board=emptyBoard(); score=0; level=1; lines=0; paused=false; gameRunning=true;
  document.getElementById('score').textContent='0';
  document.getElementById('level').textContent='1';
  document.getElementById('lines').textContent='0';
  nextPiece=randomPiece();
  spawnPiece();
  dropInterval=800;
  clearInterval(dropTimer);
  dropTimer=setInterval(tick,dropInterval);
  draw();
}

function restartGame(){ clearInterval(dropTimer); startGame(); }

function spawnPiece(){
  piece=nextPiece; nextPiece=randomPiece();
  const shape=PIECES[piece];
  pieceX=Math.floor((COLS-shape[0].length)/2);
  pieceY=0;
  if(collides(shape,pieceX,pieceY)){ gameOver(); }
  drawNext();
}

function tick(){
  if(!gameRunning||paused) return;
  if(!moveDown()) lockPiece();
}

function moveDown(){
  const shape=PIECES[piece];
  if(!collides(shape,pieceX,pieceY+1)){ pieceY++; draw(); return true; }
  return false;
}

function userMove(dx,dy){
  if(!gameRunning||paused) return;
  const shape=PIECES[piece];
  if(dy){ if(!collides(shape,pieceX,pieceY+1)) { pieceY++; } }
  else   { if(!collides(shape,pieceX+dx,pieceY)) { pieceX+=dx; } }
  draw();
}

function rotatePiece(){
  if(!gameRunning||paused) return;
  const shape=PIECES[piece];
  const rotated=shape[0].map((_,i)=>shape.map(r=>r[i]).reverse());
  // wall kick
  let nx=pieceX;
  if(!collides(rotated,nx,pieceY)){ PIECES[piece]=rotated; }
  else if(!collides(rotated,nx+1,pieceY)){ PIECES[piece]=rotated; pieceX+=1; }
  else if(!collides(rotated,nx-1,pieceY)){ PIECES[piece]=rotated; pieceX-=1; }
  draw();
}

function hardDrop(){
  if(!gameRunning||paused) return;
  const shape=PIECES[piece];
  while(!collides(shape,pieceX,pieceY+1)) pieceY++;
  lockPiece();
}

function collides(shape,ox,oy){
  for(let r=0;r<shape.length;r++) for(let c=0;c<shape[r].length;c++){
    if(!shape[r][c]) continue;
    const nx=ox+c, ny=oy+r;
    if(nx<0||nx>=COLS||ny>=ROWS) return true;
    if(ny>=0&&board[ny][nx]) return true;
  }
  return false;
}

function lockPiece(){
  const shape=PIECES[piece];
  for(let r=0;r<shape.length;r++) for(let c=0;c<shape[r].length;c++){
    if(shape[r][c]&&pieceY+r>=0) board[pieceY+r][pieceX+c]=shape[r][c];
  }
  clearLines();
  spawnPiece();
  draw();
}

function clearLines(){
  let cleared=0;
  for(let r=ROWS-1;r>=0;r--){
    if(board[r].every(c=>c)){ board.splice(r,1); board.unshift(Array(COLS).fill(0)); cleared++; r++; }
  }
  if(!cleared) return;
  lines+=cleared;
  const pts=[0,100,300,500,800][cleared]*level;
  score+=pts;
  level=Math.floor(lines/10)+1;
  dropInterval=Math.max(100,800-(level-1)*70);
  clearInterval(dropTimer); dropTimer=setInterval(tick,dropInterval);
  document.getElementById('score').textContent=score;
  document.getElementById('level').textContent=level;
  document.getElementById('lines').textContent=lines;
}

function gameOver(){
  gameRunning=false; clearInterval(dropTimer);
  ctx.fillStyle='rgba(0,0,0,0.75)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#e8f0fe';
  ctx.font='bold 20px Bebas Neue,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2-20);
  ctx.font='14px Outfit,sans-serif';
  ctx.fillStyle='#6b7a99';
  ctx.fillText(`Score: ${score}`,canvas.width/2,canvas.height/2+10);
  ctx.textAlign='left';
}

function togglePause(){
  if(!gameRunning) return;
  paused=!paused;
  if(paused){ clearInterval(dropTimer); }
  else { dropTimer=setInterval(tick,dropInterval); }
  draw();
}

function draw(){
  ctx.fillStyle='#071827';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // grid lines
  ctx.strokeStyle='rgba(255,255,255,0.03)';
  for(let r=0;r<ROWS;r++){ ctx.beginPath();ctx.moveTo(0,r*SZ);ctx.lineTo(COLS*SZ,r*SZ);ctx.stroke(); }
  for(let c=0;c<COLS;c++){ ctx.beginPath();ctx.moveTo(c*SZ,0);ctx.lineTo(c*SZ,ROWS*SZ);ctx.stroke(); }
  // board
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(board[r][c]) drawCell(ctx,c,r,COLORS[board[r][c]]);
  }
  // ghost piece
  if(gameRunning&&!paused){
    const shape=PIECES[piece];
    let gy=pieceY;
    while(!collides(shape,pieceX,gy+1)) gy++;
    for(let r=0;r<shape.length;r++) for(let c=0;c<shape[r].length;c++){
      if(shape[r][c]){ ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect((pieceX+c)*SZ+1,(gy+r)*SZ+1,SZ-2,SZ-2); }
    }
    // current piece
    for(let r=0;r<shape.length;r++) for(let c=0;c<shape[r].length;c++){
      if(shape[r][c]) drawCell(ctx,pieceX+c,pieceY+r,COLORS[shape[r][c]]);
    }
  }
  if(paused){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#e8f0fe'; ctx.font='bold 24px Bebas Neue,sans-serif'; ctx.textAlign='center';
    ctx.fillText('PAUSED',canvas.width/2,canvas.height/2); ctx.textAlign='left';
  }
}

function drawCell(c,x,y,color){
  c.fillStyle=color; c.fillRect(x*SZ+1,y*SZ+1,SZ-2,SZ-2);
  c.fillStyle='rgba(255,255,255,0.2)'; c.fillRect(x*SZ+1,y*SZ+1,SZ-2,4);
  c.fillStyle='rgba(0,0,0,0.2)'; c.fillRect(x*SZ+1,y*SZ+SZ-5,SZ-2,4);
}

function drawNext(){
  nctx.fillStyle='#0d1117'; nctx.fillRect(0,0,80,80);
  const shape=PIECES[nextPiece];
  const color=COLORS[nextPiece];
  const ns=16;
  const ox=Math.floor((80-shape[0].length*ns)/2);
  const oy=Math.floor((80-shape.length*ns)/2);
  for(let r=0;r<shape.length;r++) for(let c=0;c<shape[r].length;c++){
    if(shape[r][c]){
      nctx.fillStyle=color; nctx.fillRect(ox+c*ns+1,oy+r*ns+1,ns-2,ns-2);
    }
  }
}

window.addEventListener('keydown',e=>{
  if(!gameRunning) return;
  if(e.key==='ArrowLeft'){ e.preventDefault(); userMove(-1,0); }
  if(e.key==='ArrowRight'){ e.preventDefault(); userMove(1,0); }
  if(e.key==='ArrowDown'){ e.preventDefault(); userMove(0,1); }
  if(e.key==='ArrowUp'||e.key==='x'){ e.preventDefault(); rotatePiece(); }
  if(e.key===' '){ e.preventDefault(); hardDrop(); }
  if(e.key==='p'||e.key==='P') togglePause();
});

// initial draw
board=emptyBoard();
ctx.fillStyle='#071827'; ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='#6b7a99'; ctx.font='14px Outfit,sans-serif'; ctx.textAlign='center';
ctx.fillText('Press Start',canvas.width/2,canvas.height/2); ctx.textAlign='left';
</script>
</body>
</html>
