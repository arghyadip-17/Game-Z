<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<!-- gz --><title>Connect Four — Game-Z</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>

  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap');
  :root{
    --bg:#07080f;--surface:#0d1117;--card:#111722;--border:#1e2a3a;
    --accent:#00e5ff;--accent2:#ff3cac;--accent3:#f7c948;
    --text:#e8f0fe;--muted:#6b7a99;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  /* NAV BAR */
  .gz-nav {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 60px;
    background: rgba(7,8,15,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    flex-shrink: 0;
  }
  .gz-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    text-decoration: none;
  }
  .gz-back {
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); text-decoration: none;
    font-size: 13px; font-weight: 500;
    transition: color 0.2s;
    border: 1px solid var(--border);
    padding: 6px 16px; border-radius: 100px;
  }
  .gz-back:hover { color: var(--accent); border-color: rgba(0,229,255,0.4); }
  .gz-back::before { content: '←'; font-size: 14px; }
  .gz-game-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 2px; color: var(--text);
  }
  /* GAME WRAP */
  .gz-wrap {
    width: 100%; max-width: 1000px;
    padding: 28px 24px 40px;
    display: flex; flex-direction: column;
    align-items: center;
    flex: 1;
  }
  /* BUTTON STYLE */
  .gz-btn {
    padding: 9px 22px; border-radius: 100px; border: none;
    background: linear-gradient(135deg, var(--accent) 0%, #0090b5 100%);
    color: #000; font-weight: 700; font-size: 13px;
    cursor: pointer; letter-spacing: 0.5px;
    font-family: 'Outfit', sans-serif;
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .gz-btn:hover { box-shadow: 0 0 20px rgba(0,229,255,0.4); transform: translateY(-1px); }
  .gz-btn-ghost {
    padding: 9px 22px; border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .gz-btn-ghost:hover { border-color: rgba(0,229,255,0.4); color: var(--accent); }
  /* SCORE / HUD */
  .gz-hud {
    display: flex; gap: 16px; align-items: center;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 100px; padding: 8px 24px;
    margin-bottom: 20px;
    flex-wrap: wrap; justify-content: center;
  }
  .gz-hud-item { font-size: 14px; font-weight: 600; }
  .gz-hud-item span { color: var(--accent); }
  /* CONTROLS BAR */
  .gz-controls {
    display: flex; gap: 10px; flex-wrap: wrap;
    justify-content: center; margin-top: 16px;
  }
  /* SELECT */
  select {
    padding: 8px 14px; border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--card); color: var(--text);
    font-family: 'Outfit', sans-serif; font-size: 13px;
    cursor: pointer;
  }
  /* HINT */
  .gz-hint {
    margin-top: 12px;
    font-size: 12px; color: var(--muted);
    letter-spacing: 0.5px; text-align: center;
  }
  /* CANVAS */
  canvas {
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
    display: block;
  }
  /* BACKGROUND */
  .gz-bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
  }

/* ── GAME STYLES ── */

  /* ── Game-Z Global Overrides ── */
  body {
    background: var(--bg) !important;
    color: var(--text) !important;
    font-family: 'Outfit', system-ui, sans-serif !important;
    padding: 0 !important;
    margin: 0 !important;
  }
  button {
    font-family: 'Outfit', system-ui, sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  button:not([class]) {
    padding: 9px 22px; border-radius: 100px; border: none;
    background: linear-gradient(135deg, #00e5ff 0%, #0090b5 100%);
    color: #000; font-weight: 700; font-size: 13px;
    letter-spacing: 0.5px;
  }
  button:not([class]):hover { box-shadow: 0 0 20px rgba(0,229,255,0.4); transform: translateY(-1px); }
  input[type="number"], input[type="text"] {
    background: var(--card) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'Outfit', system-ui, sans-serif;
  }
  select {
    background: var(--card) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 100px;
    padding: 8px 14px;
    font-family: 'Outfit', system-ui, sans-serif;
    cursor: pointer;
  }
  /* Fix body padding for individual game pages */
  body > *:not(.gz-bg-grid):not(.gz-nav) { position: relative; z-index: 1; }


  body{font-family:system-ui;background:#061126;color:#e6eef8;display:flex;flex-direction:column;align-items:center;padding:18px}
  h1{color:#7dd3fc}
  .board{display:grid;grid-template-columns:repeat(7,56px);gap:8px;background:transparent;padding:12px}
  .cell{width:56px;height:56px;border-radius:50%;background:#102030;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:inset 0 -6px 10px rgba(0,0,0,0.4)}
  .cell[data-val="1"]{background:radial-gradient(circle at 30% 30%, #ff9a9e, #ff6a88)}
  .cell[data-val="2"]{background:radial-gradient(circle at 30% 30%, #9af3ff, #57d6ff)}
  .row-label{display:flex;gap:8px;margin-bottom:8px}
  button{padding:8px;border-radius:8px;border:none;background:#0369a1;color:white}
  .info{margin-top:12px;color:#9fb3c8}
  @media (max-width:520px){ .board{grid-template-columns:repeat(7,40px)} .cell{width:40px;height:40px} }
</style>
</head>
<body>

  <div class="gz-bg-grid"></div>
  <nav class="gz-nav">
    <a href="../index.html" class="gz-logo">Game‑Z</a>
    <span class="gz-game-title">Connect Four</span>
    <a href="../index.html" class="gz-back">All Games</a>
  </nav>

  <h1 style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--accent);margin:20px 0 12px">Connect Four</h1>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
    <button id="reset">New Game</button>
    <div class="info" id="info">Current: <strong id="player">Red</strong></div>
  </div>

  <div id="board" class="board" role="grid" aria-label="Connect Four board"></div>

<script>
(() => {
  const rows = 6, cols = 7;
  const boardEl = document.getElementById('board');
  const infoEl = document.getElementById('player');
  const resetBtn = document.getElementById('reset');
  let grid = [];
  let current = 1; // 1 or 2
  let gameOver=false;

  function init(){
    grid = Array(rows).fill(0).map(()=> Array(cols).fill(0));
    current = 1;
    gameOver = false;
    render();
    infoEl.textContent = current===1? 'Red':'Yellow';
  }

  function render(){
    boardEl.innerHTML = '';
    // create column overlays to click on
    for (let c=0;c<cols;c++){
      for (let r=0;r<rows;r++){
        const val = grid[r][c];
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.r = r; cell.dataset.c = c;
        cell.dataset.val = val;
        cell.addEventListener('click', ()=> onClickCol(c));
        boardEl.appendChild(cell);
      }
    }
  }

  function onClickCol(c){
    if (gameOver) return;
    for (let r = rows-1; r>=0; r--){
      if (!grid[r][c]) {
        grid[r][c] = current;
        if (checkWin(r,c,current)){
          gameOver=true;
          setTimeout(()=> alert((current===1?'Red':'Yellow') + ' wins!'), 50);
        } else if (grid.flat().every(x => x)) {
          gameOver=true;
          setTimeout(()=> alert('Draw!'),50);
        } else {
          current = current===1?2:1;
          infoEl.textContent = current===1? 'Red':'Yellow';
        }
        render();
        break;
      }
    }
  }

  function checkWin(r,c,p){
    // check four directions
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (const [dr,dc] of dirs){
      let count=1;
      // forward
      let rr=r+dr, cc=c+dc;
      while (inBounds(rr,cc) && grid[rr][cc]===p){ count++; rr+=dr; cc+=dc; }
      // backward
      rr=r-dr; cc=c-dc;
      while (inBounds(rr,cc) && grid[rr][cc]===p){ count++; rr-=dr; cc-=dc; }
      if (count>=4) return true;
    }
    return false;
  }

  function inBounds(r,c){ return r>=0 && r<rows && c>=0 && c<cols; }

  resetBtn.addEventListener('click', init);
  init();
})();
</script>
</body>
</html>
