<!doctype html>
<html>
<head><meta charset="utf-8"><!-- gz --><title>Hand Cricket</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>

  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap');
  :root{
    --bg:#07080f;--surface:#0d1117;--card:#111722;--border:#1e2a3a;
    --accent:#00e5ff;--accent2:#ff3cac;--accent3:#f7c948;
    --text:#e8f0fe;--muted:#6b7a99;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  /* NAV BAR */
  .gz-nav {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 60px;
    background: rgba(7,8,15,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    flex-shrink: 0;
  }
  .gz-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    text-decoration: none;
  }
  .gz-back {
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); text-decoration: none;
    font-size: 13px; font-weight: 500;
    transition: color 0.2s;
    border: 1px solid var(--border);
    padding: 6px 16px; border-radius: 100px;
  }
  .gz-back:hover { color: var(--accent); border-color: rgba(0,229,255,0.4); }
  .gz-back::before { content: '←'; font-size: 14px; }
  .gz-game-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 2px; color: var(--text);
  }
  /* GAME WRAP */
  .gz-wrap {
    width: 100%; max-width: 1000px;
    padding: 28px 24px 40px;
    display: flex; flex-direction: column;
    align-items: center;
    flex: 1;
  }
  /* BUTTON STYLE */
  .gz-btn {
    padding: 9px 22px; border-radius: 100px; border: none;
    background: linear-gradient(135deg, var(--accent) 0%, #0090b5 100%);
    color: #000; font-weight: 700; font-size: 13px;
    cursor: pointer; letter-spacing: 0.5px;
    font-family: 'Outfit', sans-serif;
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .gz-btn:hover { box-shadow: 0 0 20px rgba(0,229,255,0.4); transform: translateY(-1px); }
  .gz-btn-ghost {
    padding: 9px 22px; border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .gz-btn-ghost:hover { border-color: rgba(0,229,255,0.4); color: var(--accent); }
  /* SCORE / HUD */
  .gz-hud {
    display: flex; gap: 16px; align-items: center;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 100px; padding: 8px 24px;
    margin-bottom: 20px;
    flex-wrap: wrap; justify-content: center;
  }
  .gz-hud-item { font-size: 14px; font-weight: 600; }
  .gz-hud-item span { color: var(--accent); }
  /* CONTROLS BAR */
  .gz-controls {
    display: flex; gap: 10px; flex-wrap: wrap;
    justify-content: center; margin-top: 16px;
  }
  /* SELECT */
  select {
    padding: 8px 14px; border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--card); color: var(--text);
    font-family: 'Outfit', sans-serif; font-size: 13px;
    cursor: pointer;
  }
  /* HINT */
  .gz-hint {
    margin-top: 12px;
    font-size: 12px; color: var(--muted);
    letter-spacing: 0.5px; text-align: center;
  }
  /* CANVAS */
  canvas {
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
    display: block;
  }
  /* BACKGROUND */
  .gz-bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
  }

/* ── GAME STYLES ── */

  /* ── Game-Z Global Overrides ── */
  body {
    background: var(--bg) !important;
    color: var(--text) !important;
    font-family: 'Outfit', system-ui, sans-serif !important;
    padding: 0 !important;
    margin: 0 !important;
  }
  button {
    font-family: 'Outfit', system-ui, sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  button:not([class]) {
    padding: 9px 22px; border-radius: 100px; border: none;
    background: linear-gradient(135deg, #00e5ff 0%, #0090b5 100%);
    color: #000; font-weight: 700; font-size: 13px;
    letter-spacing: 0.5px;
  }
  button:not([class]):hover { box-shadow: 0 0 20px rgba(0,229,255,0.4); transform: translateY(-1px); }
  input[type="number"], input[type="text"] {
    background: var(--card) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'Outfit', system-ui, sans-serif;
  }
  select {
    background: var(--card) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 100px;
    padding: 8px 14px;
    font-family: 'Outfit', system-ui, sans-serif;
    cursor: pointer;
  }
  /* Fix body padding for individual game pages */
  body > *:not(.gz-bg-grid):not(.gz-nav) { position: relative; z-index: 1; }


 body{font-family:system-ui;background:#061126;color:#e6eef8;display:flex;flex-direction:column;align-items:center;padding:20px}
 .box{background:#071a2a;padding:14px;border-radius:10px;width:320px}
 input,button,select{padding:8px;border-radius:6px;border:1px solid #123;margin-top:8px}
 button{background:#0369a1;color:white;border:none;margin-left:8px}
 .log{margin-top:10px;font-family:monospace;white-space:pre-line}
</style>
</head>
<body>

  <div class="gz-bg-grid"></div>
  <nav class="gz-nav">
    <a href="../index.html" class="gz-logo">Game‑Z</a>
    <span class="gz-game-title">Hand Cricket</span>
    <a href="../index.html" class="gz-back">All Games</a>
  </nav>

  <h1 style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--accent);margin:20px 0 12px">Hand Cricket</h1>
  <div class="box">
    <div id="toss-area">
      <div>Call toss: <select id="call"><option value="head">head</option><option value="tail">tail</option></select>
      <button onclick="doToss()">Toss</button></div>
    </div>

    <div id="play-area" style="display:none">
      <div id="info"></div>
      <div id="input-area"></div>
      <div class="log" id="log"></div>
      <button onclick="restart()">Restart</button>
    </div>
  </div>

<script>
let userBatsFirst = null;
let userScore=0, compScore=0, computing=false;
let phase=''; // 'first-user-bat', 'first-comp-bat', 'chase-user', 'chase-comp'
function doToss(){
  const call = document.getElementById('call').value;
  const toss = Math.random() < 0.5 ? 'head' : 'tail';
  const log = document.getElementById('log');
  log.textContent = `Toss called: ${call}\nToss result: ${toss}\n`;
  if (call === toss){
    log.textContent += "You won the toss. You choose to bat first.\n";
    userBatsFirst = true;
    startUserBatFirst();
  } else {
    log.textContent += "Computer won the toss and will bat first.\n";
    userBatsFirst = false;
    startCompBatFirst();
  }
  document.getElementById('toss-area').style.display = 'none';
  document.getElementById('play-area').style.display = 'block';
}

function startUserBatFirst(){
  userScore = 0; compScore = 0;
  phase = 'first-user-bat';
  document.getElementById('info').textContent = "You bat first. Choose 1–6.";
  showInputBat();
}

function startCompBatFirst(){
  userScore = 0; compScore = 0;
  phase = 'first-comp-bat';
  document.getElementById('info').textContent = "Computer bats first. Bowl (choose 1–6).";
  showInputBowl();
}

function showInputBat(){
  const ia = document.getElementById('input-area');
  ia.innerHTML = '';
  for (let i=1;i<=6;i++){
    const btn = document.createElement('button');
    btn.textContent = i;
    btn.onclick = ()=> userBowOrPick(i);
    ia.appendChild(btn);
  }
}

function showInputBowl(){
  const ia = document.getElementById('input-area');
  ia.innerHTML = '';
  for (let i=1;i<=6;i++){
    const btn = document.createElement('button');
    btn.textContent = i;
    btn.onclick = ()=> userBowOrPick(i);
    ia.appendChild(btn);
  }
}

function userBowOrPick(num){
  if (computing) return;
  const log = document.getElementById('log');
  const comp = Math.floor(Math.random()*6)+1;
  if (phase === 'first-user-bat'){
    log.textContent += `You chose ${num}, Computer bowls ${comp}\n`;
    if (num === comp){
      log.textContent += `OUT! Your first innings ended with ${userScore}\nTarget for computer: ${userScore+1}\n`;
      phase = 'chase-comp';
      startCompChase();
    } else {
      userScore += num;
      log.textContent += `Your score: ${userScore}\n`;
    }
  } else if (phase === 'first-comp-bat'){
    log.textContent += `You bowled ${num}, Computer chose ${comp}\n`;
    if (num === comp){
      log.textContent += `You got computer OUT! Computer score: ${compScore}\nTarget for you: ${compScore+1}\n`;
      phase = 'chase-user';
      startUserChase();
    } else {
      compScore += comp;
      log.textContent += `Computer score: ${compScore}\n`;
    }
  } else if (phase === 'chase-comp'){
    log.textContent += `You bowled ${num}, Computer chose ${comp}\n`;
    if (num === comp){
      log.textContent += `You got computer OUT! Final computer score: ${compScore}\n`;
      if (compScore >= userScore+1) log.textContent += `Computer reached target. Computer wins.\n`;
      else log.textContent += `Computer failed to chase. You win!\n`;
      phase='done';
      document.getElementById('input-area').innerHTML='';
    } else {
      compScore += comp;
      log.textContent += `Computer score: ${compScore}\n`;
      if (compScore >= userScore+1){
        log.textContent += `Computer reached target. Computer wins.\n`;
        phase='done';
        document.getElementById('input-area').innerHTML='';
      }
    }
  } else if (phase === 'chase-user'){
    log.textContent += `You chose ${num}, Computer bowls ${comp}\n`;
    if (num === comp){
      log.textContent += `You are OUT! Final your score: ${userScore}\n`;
      if (userScore >= compScore+1) log.textContent += `You reached target. You win!\n`;
      else log.textContent += `You couldn't chase. Computer wins.\n`;
      phase='done';
      document.getElementById('input-area').innerHTML='';
    } else {
      userScore += num;
      log.textContent += `Your score: ${userScore}\n`;
      if (userScore >= compScore+1){
        log.textContent += `You reached target. You win!\n`;
        phase='done';
        document.getElementById('input-area').innerHTML='';
      }
    }
  }
}

function startCompChase(){
  phase = 'chase-comp';
  document.getElementById('info').textContent = `Now computer is chasing ${userScore+1}. Bowl (choose 1–6).`;
  showInputBowl();
}

function startUserChase(){
  phase = 'chase-user';
  document.getElementById('info').textContent = `Now you chase ${compScore+1}. Choose 1–6 to bat.`;
  showInputBat();
}

function restart(){
  location.reload();
}
</script>
</body>
</html>
