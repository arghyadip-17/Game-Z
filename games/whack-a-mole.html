<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Whack-a-Mole — Game-Z</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#07080f;--surface:#0d1117;--card:#111722;--border:#1e2a3a;--accent:#00e5ff;--accent2:#ff3cac;--gold:#f7c948;--text:#e8f0fe;--muted:#6b7a99}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}
  .gz-nav{width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;background:rgba(7,8,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
  .gz-logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
  .gz-back{display:flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;border:1px solid var(--border);padding:6px 16px;border-radius:100px;transition:color 0.2s,border-color 0.2s}
  .gz-back:hover{color:var(--accent);border-color:rgba(0,229,255,0.4)}
  .gz-back::before{content:'←';font-size:14px}
  .gz-game-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
  .gz-wrap{width:100%;max-width:560px;padding:24px 20px 48px;display:flex;flex-direction:column;align-items:center;flex:1;gap:16px;position:relative;z-index:1}
  .gz-btn{padding:9px 22px;border-radius:100px;border:none;background:linear-gradient(135deg,var(--accent),#0090b5);color:#000;font-weight:700;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;transition:box-shadow 0.2s,transform 0.15s}
  .gz-btn:hover{box-shadow:0 0 20px rgba(0,229,255,0.4);transform:translateY(-1px)}
  .gz-btn-ghost{padding:9px 22px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:border-color 0.2s,color 0.2s}
  .gz-btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

  /* HUD */
  .hud{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center}
  .hud-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 20px;text-align:center;min-width:90px}
  .hud-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
  .hud-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--accent)}
  .hud-val.time{color:var(--gold)}
  .hud-val.miss{color:var(--accent2)}

  /* DIFFICULTY */
  .diff-row{display:flex;gap:8px}
  .diff-btn{padding:6px 16px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s}
  .diff-btn.active,.diff-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,0.08)}

  /* GAME BOARD */
  .game-board{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:18px;
    padding:20px;
    box-shadow:0 8px 40px rgba(0,0,0,0.6);
  }

  /* HOLE */
  .hole{
    width:130px;height:110px;
    background:radial-gradient(ellipse at 50% 80%, #000 0%, #0a0e18 60%, #111722 100%);
    border-radius:50%;
    display:flex;align-items:flex-end;justify-content:center;
    overflow:hidden;
    position:relative;
    cursor:pointer;
    box-shadow:inset 0 8px 20px rgba(0,0,0,0.8), 0 4px 0 #0d1117;
    border:2px solid #0d1627;
  }

  /* MOLE */
  .mole{
    position:absolute;
    bottom:-100%;
    font-size:56px;
    line-height:1;
    transition:bottom 0.15s cubic-bezier(0.34,1.56,0.64,1);
    user-select:none;
    filter:drop-shadow(0 -4px 8px rgba(0,0,0,0.5));
    cursor:pointer;
  }
  .hole.up .mole{ bottom:0; }
  .hole.whacked .mole{ font-size:52px; filter:drop-shadow(0 0 12px rgba(255,60,172,0.8)); animation:bonk 0.3s ease; }
  @keyframes bonk{0%{transform:scale(1.3) rotate(-10deg)}50%{transform:scale(0.8) rotate(5deg)}100%{transform:scale(1) rotate(0)}}

  /* Score pop */
  .score-pop{
    position:absolute;top:10px;left:50%;transform:translateX(-50%);
    font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;
    color:var(--gold);pointer-events:none;
    animation:scorePop 0.6s ease forwards;
    white-space:nowrap;
  }
  @keyframes scorePop{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-40px) scale(1.3)}}

  /* MISS penalty flash */
  .hole.miss-flash{animation:missFlash 0.3s ease}
  @keyframes missFlash{0%,100%{border-color:#0d1627}50%{border-color:var(--accent2);box-shadow:inset 0 8px 20px rgba(0,0,0,0.8),0 0 16px rgba(255,60,172,0.4)}}

  /* Status / countdown */
  .countdown{font-family:'Bebas Neue',sans-serif;font-size:80px;letter-spacing:4px;color:var(--accent);animation:countBounce 0.4s ease}
  @keyframes countBounce{0%{transform:scale(1.5);opacity:0}100%{transform:scale(1);opacity:1}}
  .result-panel{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center}
  .result-score{font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:2px;color:var(--gold)}
  .result-label{color:var(--muted);font-size:14px}

  @media(max-width:520px){
    .hole{width:90px;height:78px}
    .mole{font-size:38px}
    .game-board{gap:10px;padding:14px}
  }
</style>
</head>
<body>
  <div style="position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none"></div>

  <nav class="gz-nav" style="position:relative;z-index:100">
    <a href="../index.html" class="gz-logo">Game‑Z</a>
    <span class="gz-game-title">Whack-a-Mole</span>
    <a href="../index.html" class="gz-back">All Games</a>
  </nav>

  <div class="gz-wrap">
    <h1 style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--accent)">Whack‑a‑Mole</h1>

    <!-- HUD -->
    <div class="hud">
      <div class="hud-box"><div class="hud-label">Score</div><div class="hud-val" id="score">0</div></div>
      <div class="hud-box"><div class="hud-label">Best</div><div class="hud-val" id="best">0</div></div>
      <div class="hud-box"><div class="hud-label">Time</div><div class="hud-val time" id="timer">30</div></div>
      <div class="hud-box"><div class="hud-label">Misses</div><div class="hud-val miss" id="misses">0</div></div>
    </div>

    <!-- Difficulty -->
    <div class="diff-row">
      <button class="diff-btn active" data-diff="easy">Easy</button>
      <button class="diff-btn" data-diff="normal">Normal</button>
      <button class="diff-btn" data-diff="hard">Hard</button>
      <button class="diff-btn" data-diff="insane">Insane</button>
    </div>

    <!-- State: idle / countdown / playing / result -->
    <div id="statePanel">
      <button class="gz-btn" onclick="startCountdown()" style="font-size:15px;padding:12px 36px">▶ Start Game</button>
    </div>

    <!-- Board -->
    <div class="game-board" id="board">
      <div class="hole" id="h0"><div class="mole" id="m0">🐭</div></div>
      <div class="hole" id="h1"><div class="mole" id="m1">🐭</div></div>
      <div class="hole" id="h2"><div class="mole" id="m2">🐭</div></div>
      <div class="hole" id="h3"><div class="mole" id="m3">🐭</div></div>
      <div class="hole" id="h4"><div class="mole" id="m4">🐭</div></div>
      <div class="hole" id="h5"><div class="mole" id="m5">🐭</div></div>
      <div class="hole" id="h6"><div class="mole" id="m6">🐭</div></div>
      <div class="hole" id="h7"><div class="mole" id="m7">🐭</div></div>
      <div class="hole" id="h8"><div class="mole" id="m8">🐭</div></div>
    </div>

    <div style="color:var(--muted);font-size:12px">Click/tap the moles before they hide! Avoid empty holes.</div>
  </div>

<script>
const DIFF_SETTINGS={
  easy:   {upTime:1200,interval:1000,maxUp:2},
  normal: {upTime:900, interval:750, maxUp:3},
  hard:   {upTime:650, interval:550, maxUp:4},
  insane: {upTime:400, interval:350, maxUp:5},
};

let score=0, misses=0, timeLeft=30, gameActive=false;
let moleTimers=Array(9).fill(null), moleUp=Array(9).fill(false);
let mainTimer=null, spawnTimer=null;
let currentDiff='easy';
let best=parseInt(localStorage.getItem('wam_best')||'0');

document.getElementById('best').textContent=best;

// Difficulty selection
document.querySelectorAll('.diff-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    if(gameActive) return;
    document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    currentDiff=b.dataset.diff;
  });
});

// Hole clicks
document.querySelectorAll('.hole').forEach((hole,i)=>{
  hole.addEventListener('click', e=>{
    if(!gameActive) return;
    if(moleUp[i]){
      whack(i);
    } else {
      // missed (hit empty hole)
      misses++;
      document.getElementById('misses').textContent=misses;
      hole.classList.add('miss-flash');
      hole.addEventListener('animationend',()=>hole.classList.remove('miss-flash'),{once:true});
    }
  });
});

function whack(i){
  const hole=document.getElementById('h'+i);
  const mole=document.getElementById('m'+i);
  hole.classList.remove('up'); hole.classList.add('whacked');
  moleUp[i]=false;
  clearTimeout(moleTimers[i]);
  score+=10;
  document.getElementById('score').textContent=score;
  // score pop
  const pop=document.createElement('div'); pop.className='score-pop'; pop.textContent='+10';
  hole.appendChild(pop); setTimeout(()=>pop.remove(),600);
  setTimeout(()=>hole.classList.remove('whacked'),300);
}

function popMole(i){
  if(!gameActive) return;
  const hole=document.getElementById('h'+i);
  hole.classList.add('up'); moleUp[i]=true;
  const {upTime}=DIFF_SETTINGS[currentDiff];
  moleTimers[i]=setTimeout(()=>{
    hole.classList.remove('up'); moleUp[i]=false;
  }, upTime);
}

function spawnMoles(){
  const {maxUp,interval}=DIFF_SETTINGS[currentDiff];
  const upCount=moleUp.filter(Boolean).length;
  if(upCount<maxUp){
    const available=[0,1,2,3,4,5,6,7,8].filter(i=>!moleUp[i]);
    if(available.length){
      const i=available[Math.floor(Math.random()*available.length)];
      popMole(i);
    }
  }
  spawnTimer=setTimeout(spawnMoles, interval*(0.7+Math.random()*0.6));
}

function startCountdown(){
  const panel=document.getElementById('statePanel');
  let count=3;
  function tick(){
    panel.innerHTML=`<div class="countdown">${count}</div>`;
    count--;
    if(count>=0) setTimeout(tick,700);
    else { panel.innerHTML=''; beginGame(); }
  }
  tick();
}

function beginGame(){
  score=0; misses=0; timeLeft=30; gameActive=true;
  document.getElementById('score').textContent='0';
  document.getElementById('misses').textContent='0';
  document.getElementById('timer').textContent='30';
  // reset all holes
  [0,1,2,3,4,5,6,7,8].forEach(i=>{
    const h=document.getElementById('h'+i); h.classList.remove('up','whacked');
    moleUp[i]=false; clearTimeout(moleTimers[i]);
  });
  spawnMoles();
  mainTimer=setInterval(()=>{
    timeLeft--;
    document.getElementById('timer').textContent=timeLeft;
    if(timeLeft<=0){ clearInterval(mainTimer); endGame(); }
  },1000);
}

function endGame(){
  gameActive=false;
  clearTimeout(spawnTimer);
  [0,1,2,3,4,5,6,7,8].forEach(i=>{ document.getElementById('h'+i).classList.remove('up'); moleUp[i]=false; clearTimeout(moleTimers[i]); });
  if(score>best){ best=score; localStorage.setItem('wam_best',best); document.getElementById('best').textContent=best; }
  const panel=document.getElementById('statePanel');
  panel.innerHTML=`
    <div class="result-panel">
      <div class="result-score">${score}</div>
      <div class="result-label">Score · ${misses} misses · Best: ${best}</div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="gz-btn" onclick="startCountdown()">▶ Play Again</button>
      </div>
    </div>`;
}
</script>
</body>
</html>
