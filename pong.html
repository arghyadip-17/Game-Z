<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<!-- gz --><title>Pong — Game-Z</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>

  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap');
  :root{
    --bg:#07080f;--surface:#0d1117;--card:#111722;--border:#1e2a3a;
    --accent:#00e5ff;--accent2:#ff3cac;--accent3:#f7c948;
    --text:#e8f0fe;--muted:#6b7a99;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  /* NAV BAR */
  .gz-nav {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 60px;
    background: rgba(7,8,15,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    flex-shrink: 0;
  }
  .gz-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    text-decoration: none;
  }
  .gz-back {
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); text-decoration: none;
    font-size: 13px; font-weight: 500;
    transition: color 0.2s;
    border: 1px solid var(--border);
    padding: 6px 16px; border-radius: 100px;
  }
  .gz-back:hover { color: var(--accent); border-color: rgba(0,229,255,0.4); }
  .gz-back::before { content: '←'; font-size: 14px; }
  .gz-game-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 2px; color: var(--text);
  }
  /* GAME WRAP */
  .gz-wrap {
    width: 100%; max-width: 1000px;
    padding: 28px 24px 40px;
    display: flex; flex-direction: column;
    align-items: center;
    flex: 1;
  }
  /* BUTTON STYLE */
  .gz-btn {
    padding: 9px 22px; border-radius: 100px; border: none;
    background: linear-gradient(135deg, var(--accent) 0%, #0090b5 100%);
    color: #000; font-weight: 700; font-size: 13px;
    cursor: pointer; letter-spacing: 0.5px;
    font-family: 'Outfit', sans-serif;
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .gz-btn:hover { box-shadow: 0 0 20px rgba(0,229,255,0.4); transform: translateY(-1px); }
  .gz-btn-ghost {
    padding: 9px 22px; border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .gz-btn-ghost:hover { border-color: rgba(0,229,255,0.4); color: var(--accent); }
  /* SCORE / HUD */
  .gz-hud {
    display: flex; gap: 16px; align-items: center;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 100px; padding: 8px 24px;
    margin-bottom: 20px;
    flex-wrap: wrap; justify-content: center;
  }
  .gz-hud-item { font-size: 14px; font-weight: 600; }
  .gz-hud-item span { color: var(--accent); }
  /* CONTROLS BAR */
  .gz-controls {
    display: flex; gap: 10px; flex-wrap: wrap;
    justify-content: center; margin-top: 16px;
  }
  /* SELECT */
  select {
    padding: 8px 14px; border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--card); color: var(--text);
    font-family: 'Outfit', sans-serif; font-size: 13px;
    cursor: pointer;
  }
  /* HINT */
  .gz-hint {
    margin-top: 12px;
    font-size: 12px; color: var(--muted);
    letter-spacing: 0.5px; text-align: center;
  }
  /* CANVAS */
  canvas {
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
    display: block;
  }
  /* BACKGROUND */
  .gz-bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
  }

/* ── GAME STYLES ── */

  /* ── Game-Z Global Overrides ── */
  body {
    background: var(--bg) !important;
    color: var(--text) !important;
    font-family: 'Outfit', system-ui, sans-serif !important;
    padding: 0 !important;
    margin: 0 !important;
  }
  button {
    font-family: 'Outfit', system-ui, sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  button:not([class]) {
    padding: 9px 22px; border-radius: 100px; border: none;
    background: linear-gradient(135deg, #00e5ff 0%, #0090b5 100%);
    color: #000; font-weight: 700; font-size: 13px;
    letter-spacing: 0.5px;
  }
  button:not([class]):hover { box-shadow: 0 0 20px rgba(0,229,255,0.4); transform: translateY(-1px); }
  input[type="number"], input[type="text"] {
    background: var(--card) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'Outfit', system-ui, sans-serif;
  }
  select {
    background: var(--card) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 100px;
    padding: 8px 14px;
    font-family: 'Outfit', system-ui, sans-serif;
    cursor: pointer;
  }
  /* Fix body padding for individual game pages */
  body > *:not(.gz-bg-grid):not(.gz-nav) { position: relative; z-index: 1; }


  body{font-family:system-ui;background:#061126;color:#e6eef8;display:flex;flex-direction:column;align-items:center;padding:18px}
  h1{color:#7dd3fc;margin:10px}
  canvas{background:linear-gradient(180deg,#071827,#041421);border-radius:8px;display:block}
  .controls{display:flex;gap:8px;margin-top:10px}
  button,select{padding:8px;border-radius:8px;border:none;background:#0369a1;color:white;cursor:pointer}
  .score{margin-top:8px;color:#cfe7ff;font-weight:700}
</style>
</head>
<body>

  <div class="gz-bg-grid"></div>
  <nav class="gz-nav">
    <a href="../index.html" class="gz-logo">Game‑Z</a>
    <span class="gz-game-title">Pong</span>
    <a href="../index.html" class="gz-back">All Games</a>
  </nav>

  <h1 style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--accent);margin:20px 0 12px">Pong</h1>
  <canvas id="c" width="700" height="420"></canvas>
  <div class="controls">
    <button id="start">Start</button>
    <button id="reset">Reset</button>
    <label style="color:#9fb3c8">Difficulty:
      <select id="diff"><option value="0.9">Easy</option><option value="0.7" selected>Normal</option><option value="0.5">Hard</option></select>
    </label>
  </div>
  <div class="score" id="score">You 0 : 0 Computer</div>

<script>
(() => {
  const canvas = document.getElementById('c'); const ctx = canvas.getContext('2d');
  const startBtn = document.getElementById('start'); const resetBtn = document.getElementById('reset');
  const diffSel = document.getElementById('diff'); const scoreEl = document.getElementById('score');
  let up=false, down=false;
  document.addEventListener('keydown', e=> { if (e.key==='ArrowUp' || e.key==='w') up=true; if (e.key==='ArrowDown' || e.key==='s') down=true; });
  document.addEventListener('keyup', e=> { if (e.key==='ArrowUp' || e.key==='w') up=false; if (e.key==='ArrowDown' || e.key==='s') down=false; });

  let paddleH = 80, paddleW = 12;
  let player = {x:10, y: canvas.height/2 - paddleH/2, score:0};
  let comp = {x: canvas.width - 10 - paddleW, y: canvas.height/2 - paddleH/2, score:0};
  let ball = {x: canvas.width/2, y: canvas.height/2, vx: 6*(Math.random()>0.5?1:-1), vy: 3*(Math.random()>0.5?1:-1), r:8};
  let loop=null, running=false;

  function reset(){
    player.score=0; comp.score=0; updateScore();
    resetBall();
    player.y = canvas.height/2 - paddleH/2; comp.y = player.y;
    draw();
  }

  function resetBall(){
    ball.x = canvas.width/2; ball.y = canvas.height/2;
    const speed = 6;
    ball.vx = (Math.random()>0.5?1:-1) * speed;
    ball.vy = (Math.random()>0.5?1:-1) * (2 + Math.random()*3);
  }

  function updateScore(){ scoreEl.textContent = `You ${player.score} : ${comp.score} Computer`; }

  function step(){
    // player paddle
    if (up) player.y -= 6; if (down) player.y += 6;
    player.y = Math.max(0, Math.min(canvas.height - paddleH, player.y));
    // computer paddle (simple tracking with smoothing)
    const difficulty = Number(diffSel.value);
    const target = ball.y - paddleH/2;
    comp.y += (target - comp.y) * (1 - difficulty); // difficulty 0..1 -> smaller means better
    comp.y = Math.max(0, Math.min(canvas.height - paddleH, comp.y));

    // ball physics
    ball.x += ball.vx; ball.y += ball.vy;
    if (ball.y - ball.r < 0 || ball.y + ball.r > canvas.height) { ball.vy *= -1; }

    // hit left paddle
    if (ball.x - ball.r <= player.x + paddleW && ball.x - ball.r > player.x){
      if (ball.y >= player.y && ball.y <= player.y + paddleH){
        ball.vx = Math.abs(ball.vx) * 1.05; // speed up slightly
        // change vy based on hit position
        const delta = (ball.y - (player.y + paddleH/2)) / (paddleH/2);
        ball.vy += delta * 3;
      }
    }
    // hit right paddle
    if (ball.x + ball.r >= comp.x && ball.x + ball.r < comp.x + paddleW){
      if (ball.y >= comp.y && ball.y <= comp.y + paddleH){
        ball.vx = -Math.abs(ball.vx) * 1.05;
        const delta = (ball.y - (comp.y + paddleH/2)) / (paddleH/2);
        ball.vy += delta * 3;
      }
    }

    // score
    if (ball.x < -30){ comp.score++; updateScore(); resetBall(); }
    if (ball.x > canvas.width + 30){ player.score++; updateScore(); resetBall(); }

    draw();
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // middle line
    ctx.fillStyle = '#0ea5e9';
    for (let y=10;y<canvas.height;y+=24) ctx.fillRect(canvas.width/2 - 1, y, 2, 14);
    // paddles
    ctx.fillStyle = '#26a69a';
    ctx.fillRect(player.x, player.y, paddleW, paddleH);
    ctx.fillStyle = '#ffb74d';
    ctx.fillRect(comp.x, comp.y, paddleW, paddleH);
    // ball
    ctx.beginPath(); ctx.fillStyle = '#e6eef8'; ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
  }

  startBtn.addEventListener('click', ()=> {
    if (running) return;
    running = true;
    loop = setInterval(step, 16);
  });
  resetBtn.addEventListener('click', ()=> {
    running = false;
    clearInterval(loop);
    reset();
  });

  // init
  reset();
  draw();
})();
</script>
</body>
</html>
