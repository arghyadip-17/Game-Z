<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<!-- gz --><title>Flappy Bird (mini) — Game-Z</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>

  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap');
  :root{
    --bg:#07080f;--surface:#0d1117;--card:#111722;--border:#1e2a3a;
    --accent:#00e5ff;--accent2:#ff3cac;--accent3:#f7c948;
    --text:#e8f0fe;--muted:#6b7a99;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  /* NAV BAR */
  .gz-nav {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 60px;
    background: rgba(7,8,15,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    flex-shrink: 0;
  }
  .gz-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    text-decoration: none;
  }
  .gz-back {
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); text-decoration: none;
    font-size: 13px; font-weight: 500;
    transition: color 0.2s;
    border: 1px solid var(--border);
    padding: 6px 16px; border-radius: 100px;
  }
  .gz-back:hover { color: var(--accent); border-color: rgba(0,229,255,0.4); }
  .gz-back::before { content: '←'; font-size: 14px; }
  .gz-game-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 2px; color: var(--text);
  }
  /* GAME WRAP */
  .gz-wrap {
    width: 100%; max-width: 1000px;
    padding: 28px 24px 40px;
    display: flex; flex-direction: column;
    align-items: center;
    flex: 1;
  }
  /* BUTTON STYLE */
  .gz-btn {
    padding: 9px 22px; border-radius: 100px; border: none;
    background: linear-gradient(135deg, var(--accent) 0%, #0090b5 100%);
    color: #000; font-weight: 700; font-size: 13px;
    cursor: pointer; letter-spacing: 0.5px;
    font-family: 'Outfit', sans-serif;
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .gz-btn:hover { box-shadow: 0 0 20px rgba(0,229,255,0.4); transform: translateY(-1px); }
  .gz-btn-ghost {
    padding: 9px 22px; border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .gz-btn-ghost:hover { border-color: rgba(0,229,255,0.4); color: var(--accent); }
  /* SCORE / HUD */
  .gz-hud {
    display: flex; gap: 16px; align-items: center;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 100px; padding: 8px 24px;
    margin-bottom: 20px;
    flex-wrap: wrap; justify-content: center;
  }
  .gz-hud-item { font-size: 14px; font-weight: 600; }
  .gz-hud-item span { color: var(--accent); }
  /* CONTROLS BAR */
  .gz-controls {
    display: flex; gap: 10px; flex-wrap: wrap;
    justify-content: center; margin-top: 16px;
  }
  /* SELECT */
  select {
    padding: 8px 14px; border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--card); color: var(--text);
    font-family: 'Outfit', sans-serif; font-size: 13px;
    cursor: pointer;
  }
  /* HINT */
  .gz-hint {
    margin-top: 12px;
    font-size: 12px; color: var(--muted);
    letter-spacing: 0.5px; text-align: center;
  }
  /* CANVAS */
  canvas {
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
    display: block;
  }
  /* BACKGROUND */
  .gz-bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
  }

/* ── GAME STYLES ── */

  /* ── Game-Z Global Overrides ── */
  body {
    background: var(--bg) !important;
    color: var(--text) !important;
    font-family: 'Outfit', system-ui, sans-serif !important;
    padding: 0 !important;
    margin: 0 !important;
  }
  button {
    font-family: 'Outfit', system-ui, sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  button:not([class]) {
    padding: 9px 22px; border-radius: 100px; border: none;
    background: linear-gradient(135deg, #00e5ff 0%, #0090b5 100%);
    color: #000; font-weight: 700; font-size: 13px;
    letter-spacing: 0.5px;
  }
  button:not([class]):hover { box-shadow: 0 0 20px rgba(0,229,255,0.4); transform: translateY(-1px); }
  input[type="number"], input[type="text"] {
    background: var(--card) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'Outfit', system-ui, sans-serif;
  }
  select {
    background: var(--card) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 100px;
    padding: 8px 14px;
    font-family: 'Outfit', system-ui, sans-serif;
    cursor: pointer;
  }
  /* Fix body padding for individual game pages */
  body > *:not(.gz-bg-grid):not(.gz-nav) { position: relative; z-index: 1; }


  body{font-family:system-ui;background:#061126;color:#e6eef8;display:flex;flex-direction:column;align-items:center;padding:18px}
  h1{color:#7dd3fc}
  canvas{background:linear-gradient(#70c5ce,#1b6b8b);border-radius:10px;display:block}
  .controls{margin-top:10px;display:flex;gap:8px}
  button{padding:8px;border-radius:8px;border:none;background:#0369a1;color:white}
  .info{margin-top:8px;color:#9fb3c8}
  @media (max-width:520px){ canvas{width:100%} }
</style>
</head>
<body>

  <div class="gz-bg-grid"></div>
  <nav class="gz-nav">
    <a href="../index.html" class="gz-logo">Game‑Z</a>
    <span class="gz-game-title">Flappy Bird</span>
    <a href="../index.html" class="gz-back">All Games</a>
  </nav>

  <h1 style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--accent);margin:20px 0 12px">Flappy Bird</h1>
  <canvas id="c" width="480" height="640"></canvas>
  <div class="controls">
    <button id="start">Start</button>
    <button id="reset">Reset</button>
  </div>
  <div class="info" id="info">Score: 0</div>

<script>
(() => {
  const canvas = document.getElementById('c'); const ctx = canvas.getContext('2d');
  const startBtn = document.getElementById('start'); const resetBtn = document.getElementById('reset');
  const info = document.getElementById('info');
  let bird = {x:80, y:canvas.height/2, vy:0, r:12};
  let pipes = [];
  let tick=0, score=0;
  let running=false, gravity=0.5, lift=-9, gap=150;
  let fpsHandle = null;

  function reset(){
    bird = {x:80, y:canvas.height/2, vy:0, r:12};
    pipes = [];
    tick=0; score=0; running=false;
    info.textContent = 'Score: 0';
    draw();
  }

  function spawnPipe(){
    const topH = 60 + Math.random()*(canvas.height - 220);
    pipes.push({x:canvas.width, top:topH, bottom: topH + gap, passed:false});
  }

  function step(){
    if (!running) { draw(); return; }
    tick++;
    // physics
    bird.vy += gravity; bird.y += bird.vy;
    if (tick % 90 === 0) spawnPipe();
    // move pipes
    for (let p of pipes){ p.x -= 3 + Math.min(3, Math.floor(score/5)); }
    // remove offscreen
    pipes = pipes.filter(p => p.x + 60 > -10);
    // check collisions
    for (let p of pipes){
      if (!p.passed && p.x + 60 < bird.x){ p.passed = true; score++; info.textContent = 'Score: '+score; }
      // collision with pipes
      if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + 60){
        if (bird.y - bird.r < p.top || bird.y + bird.r > p.bottom){
          gameOver(); return;
        }
      }
    }
    // ground / ceiling
    if (bird.y - bird.r < 0 || bird.y + bird.r > canvas.height) { gameOver(); return; }
    draw();
    fpsHandle = requestAnimationFrame(step);
  }

  function gameOver(){
    running = false;
    draw();
    setTimeout(()=> alert('Game Over! Score: '+score), 80);
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // background sky already via CSS so just draw ground
    // draw pipes
    for (let p of pipes){
      ctx.fillStyle = '#2d7a2d';
      ctx.fillRect(p.x, 0, 60, p.top);
      ctx.fillRect(p.x, p.bottom, 60, canvas.height - p.bottom);
      ctx.fillStyle = '#135213';
      ctx.fillRect(p.x, p.top - 10, 60, 10);
    }
    // draw bird
    ctx.beginPath();
    ctx.fillStyle = '#ffeb3b';
    ctx.arc(bird.x, bird.y, bird.r, 0, Math.PI*2);
    ctx.fill();
    // draw score top-left
    ctx.fillStyle = '#fff';
    ctx.font = '20px system-ui';
    ctx.fillText('Score: '+score, 12, 28);
    if (!running){
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(canvas.width/2 - 110, canvas.height/2 - 30, 220, 60);
      ctx.fillStyle = '#e6eef8';
      ctx.fillText('Click Start (or tap) to play', canvas.width/2 - 100, canvas.height/2 + 6);
    }
  }

  // controls
  function flap(){ bird.vy = lift; }
  canvas.addEventListener('click', ()=> { if (!running) running=true; flap(); if (!fpsHandle) step(); });
  canvas.addEventListener('touchstart', (e)=> { e.preventDefault(); if (!running) running=true; flap(); if (!fpsHandle) step(); }, {passive:false});
  document.addEventListener('keydown', e => { if (e.code === 'Space') { if (!running) running=true; flap(); if (!fpsHandle) step(); } });

  startBtn.addEventListener('click', ()=> { if (!running) running=true; if (!fpsHandle) step(); });
  resetBtn.addEventListener('click', ()=> { cancelAnimationFrame(fpsHandle); fpsHandle=null; reset(); });

  reset();
})();
</script>
</body>
</html>
